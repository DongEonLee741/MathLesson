<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위상 색칠</title>
<style>
:root { --bg:#0F172A; --panel:#1E293B; --text:#E2E8F0; --muted:#94A3B8;
  --border:#334155; --accent:#38BDF8; --good:#34D399; --warm:#FBBF24; --danger:#F87171; }
* { box-sizing:border-box; margin:0; padding:0; }
html, body { min-height:100%; }
body { font-family:'맑은 고딕','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:linear-gradient(180deg, #0F172A 0%, #1E1B4B 100%);
  color:var(--text); min-height:100vh; padding:14px; }
.container { max-width:880px; margin:0 auto; }
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
.title { font-size:20px; font-weight:800; color:var(--accent); }
.back { color:var(--muted); text-decoration:none; font-size:14px; }
.panel { background:var(--panel); border:1.5px solid var(--border); border-radius:14px; padding:14px; }
.stage-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:6px; margin:10px 0; }
.stage-btn { padding:8px 4px; background:#334155; color:var(--muted); border:none; border-radius:6px; font-size:12px; cursor:pointer; }
.stage-btn.unlocked { background:#1E40AF; color:#E2E8F0; }
.stage-btn.cleared { background:var(--good); color:#0F172A; font-weight:700; }
.stage-btn.active { background:var(--accent); color:#0F172A; font-weight:700; border:2px solid var(--accent); }
.stage-btn:disabled { cursor:not-allowed; opacity:0.4; }
.space-label { display:inline-block; padding:3px 10px; border-radius:8px; font-size:12px; font-weight:700; margin-right:6px; }
.space-label.plain { background:rgba(148,163,184,0.2); color:var(--muted); }
.space-label.cylinder { background:rgba(52,211,153,0.2); color:var(--good); }
.space-label.torus { background:rgba(251,191,36,0.2); color:var(--warm); }
.space-label.mobius { background:rgba(248,113,113,0.2); color:var(--danger); }
.canvas-wrap { display:flex; justify-content:center; margin:10px 0; }
canvas { background:#FFFFFF; border-radius:8px; touch-action:none; max-width:100%; }
.palette { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:10px 0; }
.color-btn { width:40px; height:40px; border-radius:50%; border:3px solid transparent; cursor:pointer; }
.color-btn.active { border-color:#0F172A; box-shadow:0 0 0 3px var(--accent); }
.controls { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; align-items:center; }
.btn { background:var(--accent); color:#0F172A; border:none; border-radius:8px; padding:8px 16px; font-weight:700; cursor:pointer; font-size:13px; }
.btn.outline { background:transparent; color:var(--accent); border:2px solid var(--accent); }
.info { background:rgba(15,23,42,0.7); border-left:3px solid var(--accent); padding:10px 14px; border-radius:6px; font-size:13px; margin:8px 0; line-height:1.5; }
.stats { font-size:13px; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
.stars { font-size:20px; }
.cleared-banner { background:linear-gradient(135deg, #34D399, #10B981); color:#0F172A; padding:14px; border-radius:10px; text-align:center; font-weight:800; font-size:16px; margin:10px 0; }
.heawood-notice { background:rgba(124,58,237,0.3); border:1.5px solid #A855F7; padding:12px 16px; border-radius:10px; margin:10px 0; font-size:14px; }
.heawood-notice b { color:#C084FC; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="title">🎨 위상 색칠</div>
    <a class="back" href="../session4.html">← 돌아가기</a>
  </div>

  <div class="panel">
    <div style="margin-bottom:8px;">
      <span class="space-label plain">평면 1~5</span>
      <span class="space-label cylinder">🥫 원기둥 6~10</span>
      <span class="space-label torus">🍩 토러스 11~15</span>
      <span class="space-label mobius">♾️ 뫼비우스 16~20</span>
    </div>
    <div class="stage-grid" id="stage-grid"></div>

    <div class="info" id="stage-info">스테이지를 선택하세요.</div>

    <div class="canvas-wrap">
      <canvas id="map" width="600" height="600"></canvas>
    </div>

    <div class="palette" id="palette"></div>

    <div class="controls">
      <span class="stats">
        <span id="stat-colors">사용 색: 0</span>
        <span id="stat-conflicts">충돌: 0</span>
        <span id="stat-stars" class="stars">☆☆☆</span>
      </span>
      <button class="btn outline" id="reset-colors" style="margin-left:auto;">↺ 색 초기화</button>
    </div>

    <div class="info">
      💡 같은 색으로 이웃한 영역(<span style="color:var(--danger);">빨간 점선</span>)이 없도록 칠하세요. 모든 영역이 충돌 없이 색칠되면 자동으로 클리어!
    </div>
  </div>
</div>

numRegions":12,"space":"mobius","chromaticNumber":5,"maxColors":6,"adjacency":[[2,3,4,5,6,9],[3,7,10],[0,3,4,5,9,10],[0,1,2,6,10],[0,2,5,8,9],[0,2,4,8,9,11],[0,3,7,9],[1,6,8],[4,5,7,9,11],[0,2,4,5,6,8],[1,2,3,11],[5,8,10]]},"mobius_4":{"rows":8,"cols":8,"regions":[[0,0,12,12,8,8,2,2],[11,12,12,12,12,8,9,1],[4,12,13,12,5,8,9,8],[7,7,13,13,5,8,8,8],[7,8,8,4,5,5,5,7],[8,8,4,4,4,4,4,4],[1,10,10,3,3,4,4,11],[1,10,6,6,6,4,11,11]],"numRegions":14,"space":"mobius","chromaticNumber":6,"maxColors":7,"adjacency":[[11,12],[2,8,9,10],[1,8,9],[4,6,10],[3,5,6,7,8,10,11,12,13],[4,7,8,12,13],[3,4,10],[4,5,8,12,13],[1,2,4,5,7,9,10,12,13],[1,2,8],[1,3,4,6,8],[0,4,12],[0,4,5,7,8,11,13],[4,5,7,8,12]]},"mobius_5":{"rows":7,"cols":7,"regions":[[9,0,0,4,4,15,14],[0,0,3,3,5,15,14],[6,5,5,5,5,5,2],[10,10,10,12,12,1,1],[2,2,2,2,12,6,6],[11,7,7,2,2,2,9],[11,13,13,8,8,9,9]],"numRegions":16,"space":"mobius","chromaticNumber":6,"maxColors":7,"adjacency":[[3,4,5,6,9],[2,5,6,10,12],[1,5,6,7,8,9,10,11,12,14],[0,4,5],[0,3,5,15],[0,1,2,3,4,6,10,12,15],[0,1,2,5,9,10,12],[2,11,13],[2,9,13],[0,2,6,8],[1,2,5,6,12],[2,7,13,14],[1,2,5,6,10],[7,8,11],[2,11,15],[4,5,14]]}};

const STAGES = [
  ...Array.from({length:5}, (_, i) => `plain_${i+1}`),
  ...Array.from({length:5}, (_, i) => `cylinder_${i+1}`),
  ...Array.from({length:5}, (_, i) => `torus_${i+1}`),
  ...Array.from({length:5}, (_, i) => `mobius_${i+1}`),
];

const COLORS = ['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899', '#06B6D4', '#84CC16'];

const state = {
  stageIdx: 0,
  stage: null,
  colors: [], // index by region
  selectedColor: 0,
  cleared: false,
};

const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');

const stageGrid = document.getElementById('stage-grid');
STAGES.forEach((key, idx) => {
  const btn = document.createElement('button');
  btn.className = 'stage-btn';
  btn.textContent = idx + 1;
  btn.dataset.idx = idx;
  btn.addEventListener('click', () => selectStage(idx));
  stageGrid.appendChild(btn);
});

function updateStageButtons() {
  document.querySelectorAll('.stage-btn').forEach((btn, idx) => {
    btn.classList.remove('unlocked', 'cleared', 'active');
    const cleared = localStorage.getItem('topo_coloring_cleared_' + (idx+1)) === '1';
    const unlocked = idx === 0 || localStorage.getItem('topo_coloring_cleared_' + idx) === '1';
    btn.disabled = !unlocked;
    if (cleared) btn.classList.add('cleared');
    else if (unlocked) btn.classList.add('unlocked');
    if (idx === state.stageIdx) btn.classList.add('active');
  });
}

function selectStage(idx) {
  state.stageIdx = idx;
  const key = STAGES[idx];
  state.stage = COLORING_DATA[key];
  if (!state.stage) return;
  state.colors = new Array(state.stage.numRegions).fill(null);
  state.cleared = false;
  state.selectedColor = 0;
  buildPalette();
  document.getElementById('stage-info').innerHTML =
    `<b>스테이지 ${idx+1} — ${state.stage.space}</b>: ${state.stage.numRegions}개 영역. <b>최소 ${state.stage.chromaticNumber}색</b>으로 충돌 없이 칠하세요 (제공: ${state.stage.maxColors}색).`;
  localStorage.setItem('topo_coloring_stage', String(idx + 1));
  document.querySelector('.cleared-banner')?.remove();
  document.querySelector('.heawood-notice')?.remove();
  updateStageButtons();
  updateStats();
  render();
}

function buildPalette() {
  const pal = document.getElementById('palette');
  pal.innerHTML = '';
  for (let i = 0; i < state.stage.maxColors; i++) {
    const b = document.createElement('button');
    b.className = 'color-btn' + (i === state.selectedColor ? ' active' : '');
    b.style.background = COLORS[i];
    b.dataset.idx = i;
    b.addEventListener('click', () => {
      state.selectedColor = i;
      buildPalette();
    });
    pal.appendChild(b);
  }
}

function updateStats() {
  const used = new Set(state.colors.filter(c => c !== null)).size;
  document.getElementById('stat-colors').textContent = `사용 색: ${used}`;
  const conflicts = countConflicts();
  document.getElementById('stat-conflicts').textContent = `충돌: ${conflicts}`;
  // Stars
  let stars = '☆☆☆';
  if (state.colors.every(c => c !== null) && conflicts === 0) {
    if (used === state.stage.chromaticNumber) stars = '★★★';
    else if (used === state.stage.chromaticNumber + 1) stars = '★★☆';
    else stars = '★☆☆';
  }
  document.getElementById('stat-stars').textContent = stars;
}

function countConflicts() {
  let cnt = 0;
  for (let i = 0; i < state.stage.numRegions; i++) {
    if (state.colors[i] === null) continue;
    for (const j of state.stage.adjacency[i]) {
      if (j > i && state.colors[j] === state.colors[i]) cnt++;
    }
  }
  return cnt;
}

function checkClear() {
  if (state.cleared) return;
  if (state.colors.every(c => c !== null) && countConflicts() === 0) {
    state.cleared = true;
    const num = state.stageIdx + 1;
    localStorage.setItem('topo_coloring_cleared_' + num, '1');
    const used = new Set(state.colors).size;
    const stars = used === state.stage.chromaticNumber ? '★★★' : (used === state.stage.chromaticNumber + 1 ? '★★☆' : '★☆☆');
    const banner = document.createElement('div');
    banner.className = 'cleared-banner';
    banner.innerHTML = `🎉 스테이지 ${num} 클리어! ${stars} (${used}색 사용)`;
    document.querySelector('.panel').insertBefore(banner, document.querySelector('.canvas-wrap'));

    // Torus 5 (stage idx 14) — Heawood notice
    if (state.stage.space === 'torus' && num === 15) {
      const h = document.createElement('div');
      h.className = 'heawood-notice';
      h.innerHTML = `🎓 수학자들은 토러스에서 최대 <b>7색</b>이 필요한 지도가 존재함을 증명했습니다 (<b>Heawood 추측</b>, 1968년 Ringel·Youngs 증명).<br><br>여러분이 체험한 지도는 ${used}색이면 충분했지만, 더 복잡한 지도에서는 7색이 필요할 수 있습니다!`;
      document.querySelector('.panel').appendChild(h);
    }
    updateStageButtons();
  }
}

document.getElementById('reset-colors').addEventListener('click', () => {
  state.colors = new Array(state.stage.numRegions).fill(null);
  state.cleared = false;
  document.querySelector('.cleared-banner')?.remove();
  document.querySelector('.heawood-notice')?.remove();
  updateStats();
  render();
});

// Click region
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scale = canvas.width / rect.width;
  const px = (e.clientX - rect.left) * scale;
  const py = (e.clientY - rect.top) * scale;
  handleClick(px, py);
});
canvas.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scale = canvas.width / rect.width;
  const px = (e.touches[0].clientX - rect.left) * scale;
  const py = (e.touches[0].clientY - rect.top) * scale;
  handleClick(px, py);
  e.preventDefault();
}, { passive: false });

function handleClick(px, py) {
  if (!state.stage) return;
  const { rows, cols, regions } = state.stage;
  const cellW = Math.min(canvas.width / cols, canvas.height / rows);
  const offX = (canvas.width - cellW * cols) / 2;
  const offY = (canvas.height - cellW * rows) / 2;
  const c = Math.floor((px - offX) / cellW);
  const r = Math.floor((py - offY) / cellW);
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  const region = regions[r][c];
  state.colors[region] = state.selectedColor;
  updateStats();
  render();
  checkClear();
}

function render() {
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!state.stage) return;
  const { rows, cols, regions, numRegions } = state.stage;
  const cellW = Math.min(canvas.width / cols, canvas.height / rows);
  const offX = (canvas.width - cellW * cols) / 2;
  const offY = (canvas.height - cellW * rows) / 2;

  // Fill regions
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const rid = regions[r][c];
    const colorIdx = state.colors[rid];
    ctx.fillStyle = colorIdx === null ? '#F3F4F6' : COLORS[colorIdx];
    ctx.fillRect(offX + c*cellW, offY + r*cellW, cellW, cellW);
  }

  // Region borders (between different regions)
  ctx.strokeStyle = '#1F2937'; ctx.lineWidth = 2;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const rid = regions[r][c];
    // Right neighbor
    if (c < cols-1 && regions[r][c+1] !== rid) {
      ctx.beginPath();
      ctx.moveTo(offX + (c+1)*cellW, offY + r*cellW);
      ctx.lineTo(offX + (c+1)*cellW, offY + (r+1)*cellW);
      ctx.stroke();
    }
    if (r < rows-1 && regions[r+1][c] !== rid) {
      ctx.beginPath();
      ctx.moveTo(offX + c*cellW, offY + (r+1)*cellW);
      ctx.lineTo(offX + (c+1)*cellW, offY + (r+1)*cellW);
      ctx.stroke();
    }
  }

  // Outer border with space color
  const sp = state.stage.space;
  ctx.lineWidth = 5;
  ctx.strokeStyle = sp === 'plain' ? '#1F2937' : (sp === 'mobius' ? '#F87171' : '#10B981');
  ctx.strokeRect(offX, offY, cols*cellW, rows*cellW);

  // Conflict highlight
  ctx.strokeStyle = '#EF4444';
  ctx.lineWidth = 3;
  ctx.setLineDash([6, 4]);
  // We need to highlight adjacency between same-colored regions
  // Iterate cell pairs:
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const rid = regions[r][c];
    if (state.colors[rid] === null) continue;
    // Right
    let nr = r, nc = c + 1;
    if (nc >= cols) {
      if (sp === 'cylinder' || sp === 'torus') nc = 0;
      else if (sp === 'mobius') { nc = 0; nr = rows-1-r; }
      else continue;
    }
    const nrid = regions[nr][nc];
    if (nrid !== rid && state.colors[nrid] === state.colors[rid]) {
      // Only draw the edge in main tile
      if (nc !== 0 || (nc === 0 && c + 1 < cols)) {
        // Edge within main tile
        ctx.beginPath();
        ctx.moveTo(offX + (c+1)*cellW, offY + r*cellW + 4);
        ctx.lineTo(offX + (c+1)*cellW, offY + (r+1)*cellW - 4);
        ctx.stroke();
      }
    }
    // Down
    let nr2 = r + 1, nc2 = c;
    if (nr2 >= rows) {
      if (sp === 'torus') nr2 = 0;
      else continue;
    }
    const nrid2 = regions[nr2][nc2];
    if (nrid2 !== rid && state.colors[nrid2] === state.colors[rid]) {
      if (nr2 !== 0 || (nr2 === 0 && r + 1 < rows)) {
        ctx.beginPath();
        ctx.moveTo(offX + c*cellW + 4, offY + (r+1)*cellW);
        ctx.lineTo(offX + (c+1)*cellW - 4, offY + (r+1)*cellW);
        ctx.stroke();
      }
    }
  }
  ctx.setLineDash([]);
}

updateStageButtons();
const lastIdx = Math.max(0, Math.min(19, parseInt(localStorage.getItem('topo_coloring_stage') || '1') - 1));
selectStage(lastIdx);
</script>
</body>
